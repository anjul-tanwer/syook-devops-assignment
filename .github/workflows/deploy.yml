name: Full Auto CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-2

    - name: Terraform Init
      run: |
        cd task-2/terraform
        terraform init -reconfigure

    - name: Terraform Apply
      run: |
        cd task-2/terraform
        terraform apply -auto-approve \
          -var="key_name=${{ secrets.KEY_NAME }}"

    # ⏳ Wait for EC2 + Docker to be fully ready
    - name: Wait for Server to be Ready
      run: sleep 90

    - name: Deploy Application via SSH
      run: |
        cd task-2/terraform

        # Get public IP directly from Terraform
        IP=$(terraform output -raw public_ip | grep -Eo '([0-9]{1,3}\.){3}[0-9]{1,3}')

        echo "Server IP: $IP"

        # Save SSH key
        echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
        chmod 400 key.pem

        # Connect and deploy
        ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$IP << 'EOF'
          git clone https://github.com/anjul-tanwer/syook-devops-assignment.git app || true
          cd app/task-2
          git pull
          docker-compose down
          docker-compose up --build -d
        EOF
