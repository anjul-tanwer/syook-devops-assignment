name: Full Auto CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-2

    - name: Terraform Init
      run: |
        cd task-2/terraform
        terraform init -reconfigure

    - name: Terraform Apply
      run: |
        cd task-2/terraform
        terraform apply -auto-approve -var="key_name=${{ secrets.KEY_NAME }}"
        echo "public_ip=$(terraform output -raw public_ip)" >> $GITHUB_OUTPUT

    - name: Deploy Application
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ steps.terraform.outputs.public_ip }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          git clone https://github.com/anjul-tanwer/syook-devops-assignment.git app || true
          cd app/task-2
          git pull
          docker-compose down
          docker-compose up --build -d
