name: Full Auto CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-2

    - name: Terraform Init
      run: |
        cd task-2/terraform
        terraform init -reconfigure

    - name: Terraform Apply
      run: |
        cd task-2/terraform
        terraform apply -auto-approve \
          -var="key_name=${{ secrets.KEY_NAME }}"

    - name: Get EC2 Public IP using AWS CLI
      id: get_ip
      run: |
        cd task-2/terraform
        # Get instance ID from terraform state
        INSTANCE_ID=$(terraform show -json | jq -r '.values.root_module.resources[] | select(.type=="aws_instance" and .name=="app") | .values.id')
        # Get public IP using AWS CLI (clean output)
        IP=$(aws ec2 describe-instances --instance-ids $INSTANCE_ID --query 'Reservations[0].Instances[0].PublicIpAddress' --output text)
        echo "Extracted IP: $IP"
        echo "instance_ip=$IP" >> $GITHUB_OUTPUT

    - name: Save SSH Key
      run: |
        echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
        chmod 400 key.pem

    - name: Wait for SSH and Deploy
      run: |
        IP="${{ steps.get_ip.outputs.instance_ip }}"
        echo "Target IP: $IP"
        
        # Wait for SSH to be ready
        for attempt in {1..20}; do
          echo "SSH attempt $attempt/20..."
          if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 -i key.pem ubuntu@$IP "exit" 2>/dev/null; then
            echo "SSH ready!"
            break
          fi
          sleep 10
        done
        
        # Deploy
        ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$IP << 'EOF'
          set -e
          
          # Install Docker if not present
          if ! command -v docker &> /dev/null; then
            sudo apt-get update -y
            sudo apt-get install -y docker.io docker-compose git
            sudo systemctl start docker
            sudo systemctl enable docker
            sudo usermod -aG docker ubuntu
          fi
          
          # Clone and deploy
          if [ ! -d "syook-devops-assignment" ]; then
            git clone https://github.com/anjul-tanwer/syook-devops-assignment.git
          else
            cd syook-devops-assignment && git pull && cd ..
          fi
          
          cd syook-devops-assignment/task-2
          sudo docker compose up --build -d || sudo docker-compose up --build -d
          
          echo "Deployment complete!"
          sudo docker ps
        EOF

    - name: Output URLs
      run: |
        IP="${{ steps.get_ip.outputs.instance_ip }}"
        echo "========================================="
        echo "DEPLOYMENT SUCCESSFUL"
        echo "========================================="
        echo "LAMP: http://$IP:8080"
        echo "MERN: http://$IP:3000"
        echo "========================================="
