name: Full Auto CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-2

    - name: Terraform Init & Apply
      run: |
        cd task-2/terraform
        terraform init -reconfigure
        terraform apply -auto-approve -var="key_name=${{ secrets.KEY_NAME }}"

    - name: Get EC2 IP and Deploy
      run: |
        cd task-2/terraform
        IP=$(terraform output -raw public_ip)
        
        echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
        chmod 400 key.pem
        
        ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$IP << 'EOF'
          sudo apt-get update -y
          sudo apt-get install -y docker.io docker-compose git
          sudo systemctl start docker
          sudo usermod -aG docker ubuntu
          
          git clone https://github.com/anjul-tanwer/syook-devops-assignment.git app || (cd app && git pull)
          cd app/task-2
          docker-compose down || true
          docker-compose up --build -d
        EOF
