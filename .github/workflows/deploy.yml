name: Full Auto CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-2

    - name: Terraform Init
      run: |
        cd task-2/terraform
        terraform init -reconfigure

    - name: Terraform Apply
      run: |
        cd task-2/terraform
        terraform apply -auto-approve \
          -var="key_name=${{ secrets.KEY_NAME }}"

    # ⏳ Wait for EC2 + Docker to be fully ready
    - name: Wait for Server to be Ready
      run: sleep 90

    - name: Deploy Application via SSH
      run: |
        cd task-2/terraform

        # Extract clean IP (only first line, remove garbage)
        IP=$(terraform output -raw public_ip | head -n 1 | tr -d '\r' | tr -d '\n')

        echo "Using IP: $IP"

        # Save SSH key
        echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
        chmod 400 key.pem

        # SSH and deploy (NO extra lines allowed)
        ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$IP << 'EOF'
          set -e
          git clone https://github.com/anjul-tanwer/syook-devops-assignment.git app || true
          cd app/task-2
          git pull
          docker-compose down || true
          docker-compose up --build -d
        EOF
                                                
