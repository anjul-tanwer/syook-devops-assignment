version: '3.8'

services:

  nginx:
    image: nginx:latest
    container_name: reverse-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - mern-frontend
      - lamp-apache
    networks:
      - app-network

  # ---------- MERN STACK ----------

  mongo:
    image: mongo:6
    container_name: mongo
    restart: always
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

  mern-backend:
    build: ./mern/backend
    container_name: mern-backend
    environment:
      - MONGO_URI=mongodb://mongo:27017/mydb
    depends_on:
      - mongo
    networks:
      - app-network

  mern-frontend:
    build: ./mern/frontend
    container_name: mern-frontend
    networks:
      - app-network

  # ---------- LAMP STACK ----------

  mysql:
    image: mysql:8
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: mydb
    volumes:
      - mysql-data:/var/lib/mysql
      - ./lamp/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network

  lamp-apache:
    build: ./lamp/apache
    container_name: lamp-apache
    depends_on:
      - mysql
    networks:
      - app-network

networks:
  app-network:

volumes:
  mongo-data:
  mysql-data:
